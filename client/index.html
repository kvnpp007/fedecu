<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="stylesheet" href="./src/css/style.css">
  <title>Motor Interactivo FEDECU</title>
</head>

<body>
  <div id="lobby">
    <img src="https://upload.wikimedia.org/wikipedia/commons/4/4b/UABCS_logo.png" alt="Logo" width="150"
      style="filter: brightness(0) invert(1);">
    <h2>Selecciona tu rol</h2>
    <button id="btn-host">Iniciar Pantalla (Proyector)</button>
    <div style="margin-top: 30px; display: flex; flex-direction: column; gap: 10px;">
      <input type="text" id="input-code" placeholder="CÓDIGO DE SALA" maxlength="4">
      <input type="text" id="input-name" placeholder="Tu Nombre">
      <button id="btn-join" style="background-color: var(--accent);">Entrar a Jugar</button>
    </div>
  </div>

  <div id="master-board">
    <h1>ÚNETE EN TU TELÉFONO</h1>
    <div id="room-code-display">----</div>
    <h2 id="players-list-display">Esperando jugadores...</h2>
  </div>

  <div id="player-controls">
    <h2 style="text-align: center;">Tu Control</h2>
    <button class="buzzer" id="btn-buzzer">¡PRESIONAR!</button>
    <button id="btn-connect-arduino" style="background: #0ea5e9;">Vincular Botonera Arduino</button>
  </div>

  <script type="module" src="/main.js"></script>
</body>

</html>
