<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Estudios FEDECU - Hub de Juegos</title>
  <link rel="stylesheet" href="/src/css/style.css">
</head>

<body>

  <div id="lobby">
    <header class="hub-header">
      <h2 style="margin:0; letter-spacing: 2px;">ESTUDIOS <span style="color:var(--accent)">FEDECU</span></h2>
      <div class="user-profile">
        <button
          style="background:transparent; border:1px solid white; border-radius:5px; color: white; padding: 8px 15px; cursor: pointer;">Mi
          Perfil</button>
      </div>
    </header>

    <main>
      <h3 style="padding-left: 50px; margin-top: 100px; font-size: 1.5rem;">Tus Favoritos y Novedades</h3>

      <div id="carousel-games" class="carousel-container">
      </div>
    </main>
  </div>

  <script type="module" src="/main.js"></script>
</body>

</html>
