<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="stylesheet" href="./src/css/style.css">
  <title>Motor Interactivo FEDECU</title>
</head>

<body>
  <div id="lobby">
    <header class="hub-header">
      <h2 style="margin:0; letter-spacing: 2px;">ESTUDIOS <span style="color:var(--accent)">FEDECU</span></h2>
      <div class="user-profile">
        <button style="background:transparent; border:1px solid white; border-radius:5px;">Mi Perfil</button>
      </div>
    </header>

    <main>
      <h3 style="padding-left: 50px; margin-top: 100px; font-size: 1.5rem;">Tus Favoritos y Novedades</h3>
      <div id="carousel-games" class="carousel-container">
      </div>
    </main>
  </div>

  <div id="master-board">
    <h1>ÚNETE EN TU TELÉFONO</h1>
    <div id="room-code-display">----</div>
    <h2 id="players-list-display">Esperando jugadores...</h2>
  </div>

  <div id="player-controls">
    <h2 style="text-align: center;">Tu Control</h2>
    <button class="buzzer" id="btn-buzzer">¡PRESIONAR!</button>
    <button id="btn-connect-arduino" style="background: #0ea5e9;">Vincular Botonera Arduino</button>
  </div>

  <script type="module" src="/main.js"></script>
</body>

</html>
